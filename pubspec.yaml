name: hivtb_mobile
description: HIV & TB Patient Monitoring — Dream Medical Center, Rwanda

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.0.0

  # HTTP
  dio: ^5.7.0

  # Secure storage (JWT tokens)
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.69.0

  # Fonts
  google_fonts: ^6.2.1

  # Date formatting
  intl: ^0.19.0

  # Connectivity
  connectivity_plus: ^6.1.0

  # One-time GPS read for geohash computation (CHW patient screening)
  geolocator: ^13.0.2

  # Firebase push notifications (FCM)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Local notifications (used to show FCM messages in foreground)
  flutter_local_notifications: ^18.0.1

  # Image picker
  image_picker: ^1.1.2

  # Offline DB
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
